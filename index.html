<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>press me</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff8fe;
      font-family: 'Fredoka One', cursive;
      overflow: hidden;
      transition: background 0.4s;
    }

    #scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 2rem;
      width: 100%;
    }

    #subtitle {
      font-size: 16px;
      color: #c084c8;
      font-family: sans-serif;
      letter-spacing: .02em;
      text-align: center;
      transition: color 0.3s;
    }

    #btn {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      padding: 16px 44px;
      border-radius: 999px;
      border: 3px solid #ff9de2;
      background: #fff0fa;
      color: #c026a0;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, font-size .35s cubic-bezier(.34,1.56,.64,1), padding .35s, border-color .3s, color .3s;
      box-shadow: 0 4px 0 #ff9de2;
      position: relative;
      z-index: 10;
    }

    #btn:hover { transform: translateY(-2px); }
    #btn:active { transform: translateY(3px); }

    #word {
      font-family: 'Fredoka One', cursive;
      font-size: 0px;
      opacity: 0;
      letter-spacing: .05em;
      transition: font-size .4s cubic-bezier(.34,1.56,.64,1), opacity .25s;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
      max-width: 95vw;
      word-break: break-word;
    }

    #word.show { opacity: 1; }

    #wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #sparks {
      position: absolute;
      pointer-events: none;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: visible;
      z-index: 1;
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      animation: fly 1s ease-out forwards;
    }

    @keyframes fly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    @keyframes boing {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.2) rotate(-3deg); }
      55%  { transform: scale(0.92) rotate(2deg); }
      75%  { transform: scale(1.08) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px) rotate(-2deg); }
      40%     { transform: translateX(8px) rotate(2deg); }
      60%     { transform: translateX(-6px) rotate(-1deg); }
      80%     { transform: translateX(6px) rotate(1deg); }
    }

    @keyframes flash {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.6; }
    }

    .boing { animation: boing .55s cubic-bezier(.36,.07,.19,.97); }
    .shake { animation: shake .4s ease-in-out; }
    .flash { animation: flash .15s ease-in-out 3; }
  </style>
</head>
<body>
  <div id="scene">
    <div id="subtitle">a very innocent little button</div>
    <div id="wrapper">
      <div id="sparks"></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:24px;position:relative;z-index:2">
        <button id="btn">press me</button>
        <div id="word"></div>
      </div>
    </div>
  </div>

  <script>
    const btn      = document.getElementById('btn');
    const word     = document.getElementById('word');
    const sparks   = document.getElementById('sparks');
    const subtitle = document.getElementById('subtitle');

    const steps = [
      {
        word: 'cunt',
        size: 'clamp(72px, 18vw, 140px)',
        gradient: 'linear-gradient(90deg,#ff4e50,#fc913a,#f9d62e,#76b852,#00c3ff,#a855f7)',
        subtitle: 'there it is 😇',
        btnLabel: 'again??',
        btnSize: '22px', btnPad: '16px 44px',
        btnBorder: '#ff9de2', btnColor: '#c026a0',
        bg: '#fff8fe',
        sparks: { count: 28, dist: 130, size: 10 },
        sound: 'pop',
        anim: 'boing',
      },
      {
        word: 'bitch',
        size: 'clamp(86px, 21vw, 170px)',
        gradient: 'linear-gradient(90deg,#f9d62e,#76b852,#00c3ff,#a855f7,#ff69b4,#ff4e50)',
        subtitle: 'okay bestie 💅',
        btnLabel: 'one more',
        btnSize: '26px', btnPad: '18px 52px',
        btnBorder: '#fb923c', btnColor: '#ea580c',
        bg: '#fff9f5',
        sparks: { count: 44, dist: 170, size: 13 },
        sound: 'boing',
        anim: 'boing',
      },
      {
        word: 'fuck you',
        size: 'clamp(60px, 19vw, 200px)',
        gradient: 'linear-gradient(90deg,#a855f7,#ff4e50,#fc913a,#f9d62e,#76b852,#00c3ff,#ff69b4)',
        subtitle: 'lmaoooo 💀',
        btnLabel: 'DO IT AGAIN',
        btnSize: '28px', btnPad: '20px 58px',
        btnBorder: '#a855f7', btnColor: '#7c3aed',
        bg: '#fdf8ff',
        sparks: { count: 60, dist: 220, size: 16 },
        sound: 'fart',
        anim: 'shake',
      },
      {
        word: 'shit fuck\ncunt',
        size: 'clamp(52px, 16vw, 190px)',
        gradient: 'linear-gradient(90deg,#ff4e50,#fc913a,#f9d62e,#76b852,#00c3ff,#a855f7,#ff69b4,#ff4e50)',
        subtitle: 'are you okay??',
        btnLabel: 'SEND IT',
        btnSize: '30px', btnPad: '22px 62px',
        btnBorder: '#22c55e', btnColor: '#15803d',
        bg: '#f0fdf4',
        sparks: { count: 80, dist: 270, size: 19 },
        sound: 'airhorn',
        anim: 'boing',
      },
      {
        word: 'absolute\nfucking\nbellend',
        size: 'clamp(44px, 14vw, 160px)',
        gradient: 'linear-gradient(135deg,#ff4e50,#a855f7,#00c3ff,#f9d62e,#76b852,#fc913a)',
        subtitle: 'someone help them 🚨',
        btnLabel: 'AGAIN AGAIN AGAIN',
        btnSize: '26px', btnPad: '22px 48px',
        btnBorder: '#ef4444', btnColor: '#dc2626',
        bg: '#fff5f5',
        sparks: { count: 110, dist: 340, size: 23 },
        sound: 'chaos',
        anim: 'shake',
      },
      {
        word: 'TWAT',
        size: 'clamp(60px, 18vw, 210px)',
        gradient: 'linear-gradient(90deg,#f9d62e,#ff4e50,#a855f7,#00c3ff,#76b852,#fc913a,#ff69b4)',
        subtitle: 'you really said it',
        btnLabel: '...ONE MORE',
        btnSize: '28px', btnPad: '20px 56px',
        btnBorder: '#f9d62e', btnColor: '#b45309',
        bg: '#fffbeb',
        sparks: { count: 130, dist: 380, size: 26 },
        sound: 'chaos',
        anim: 'boing',
      },
      {
        word: 'DICKHEAD\nARSEFACE\nWANKER',
        size: 'clamp(36px, 11vw, 130px)',
        gradient: 'linear-gradient(90deg,#ff4e50,#fc913a,#f9d62e,#76b852,#00c3ff,#a855f7,#ff69b4,#ff4e50,#fc913a)',
        subtitle: 'legendary. truly.',
        btnLabel: 'THE FINAL BOSS',
        btnSize: '24px', btnPad: '20px 44px',
        btnBorder: '#00c3ff', btnColor: '#0284c7',
        bg: '#f0f9ff',
        sparks: { count: 160, dist: 420, size: 28 },
        sound: 'chaos',
        anim: 'shake',
      },
    ];

    const colors = ['#ff4e50','#fc913a','#f9d62e','#76b852','#00c3ff','#a855f7','#ff69b4','#ff8c00','#e879f9','#34d399','#f472b6','#fbbf24'];

    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playPop() {
      const ctx = getCtx();
      // Big satisfying cartoon pop with reverb tail
      const osc = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();
      const gain2 = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(900, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.18);
      gain.gain.setValueAtTime(0.7, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.22);
      // sparkle overtone
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(1800, ctx.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
      gain2.gain.setValueAtTime(0.3, ctx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 0.12);
    }

    function playBoing() {
      const ctx = getCtx();
      // Deep springy boing with wobble
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(40, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(700, ctx.currentTime + 0.06);
      osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.7);
      // wobble
      for (let i = 0; i < 8; i++) {
        const t = ctx.currentTime + 0.06 + i * 0.07;
        osc.frequency.setValueAtTime(700 * Math.pow(0.55, i) * (i%2===0?1.12:0.88), t);
      }
      gain.gain.setValueAtTime(0.6, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.75);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.75);
    }

    function playFart() {
      const ctx = getCtx();
      // Wet, rumbly, embarrassing fart
      const duration = 0.75;
      const bufSize = Math.floor(ctx.sampleRate * duration);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      let phase = 0;
      for (let i = 0; i < bufSize; i++) {
        const t = i / ctx.sampleRate;
        const env = Math.pow(1 - t / duration, 1.2);
        const freq = 60 + 40 * Math.sin(t * 18) + 20 * Math.sin(t * 7);
        phase += (2 * Math.PI * freq) / ctx.sampleRate;
        const buzz = Math.sign(Math.sin(phase)) * 0.6;
        const noise = (Math.random() * 2 - 1) * 0.4;
        data[i] = (buzz + noise) * env;
      }
      const src = ctx.createBufferSource();
      const filter = ctx.createBiquadFilter();
      const filter2 = ctx.createBiquadFilter();
      const gain = ctx.createGain();
      filter.type = 'lowpass'; filter.frequency.value = 400;
      filter2.type = 'peaking'; filter2.frequency.value = 120; filter2.gain.value = 12;
      src.buffer = buf;
      src.connect(filter); filter.connect(filter2); filter2.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.8, ctx.currentTime);
      src.start(ctx.currentTime);
    }

    function playAirhorn() {
      const ctx = getCtx();
      // Massive stadium airhorn
      const freqs = [116, 155, 185, 233, 311];
      freqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = freq * 2; filter.Q.value = 0.8;
        osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const t = ctx.currentTime;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.22, t + 0.04);
        gain.gain.setValueAtTime(0.22, t + 0.6);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
        osc.start(t); osc.stop(t + 1.1);
      });
      // sub bass thud underneath
      const sub = ctx.createOscillator();
      const subGain = ctx.createGain();
      sub.connect(subGain); subGain.connect(ctx.destination);
      sub.type = 'sine'; sub.frequency.value = 58;
      subGain.gain.setValueAtTime(0.5, ctx.currentTime);
      subGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      sub.start(ctx.currentTime); sub.stop(ctx.currentTime + 0.35);
    }

    function playChaos() {
      const ctx = getCtx();
      // Distorted explosion with descending scream
      const bufSize = Math.floor(ctx.sampleRate * 0.8);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 0.5);
      }
      const noise = ctx.createBufferSource();
      const noiseFilter = ctx.createBiquadFilter();
      const noiseGain = ctx.createGain();
      noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 800; noiseFilter.Q.value = 0.5;
      noise.buffer = buf;
      noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ctx.destination);
      noiseGain.gain.setValueAtTime(0.9, ctx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
      noise.start(ctx.currentTime);
      // screaming pitch drop
      [0, 0.05, 0.1, 0.18, 0.28].forEach((offset, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = i % 2 === 0 ? 'sawtooth' : 'square';
        const startFreq = 1200 - i * 180;
        osc.frequency.setValueAtTime(startFreq, ctx.currentTime + offset);
        osc.frequency.exponentialRampToValueAtTime(startFreq * 0.15, ctx.currentTime + offset + 0.55);
        g.gain.setValueAtTime(0.25, ctx.currentTime + offset);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.6);
        osc.start(ctx.currentTime + offset);
        osc.stop(ctx.currentTime + offset + 0.6);
      });
      // final sub boom
      const boom = ctx.createOscillator();
      const boomGain = ctx.createGain();
      boom.connect(boomGain); boomGain.connect(ctx.destination);
      boom.type = 'sine'; boom.frequency.setValueAtTime(80, ctx.currentTime);
      boom.frequency.exponentialRampToValueAtTime(25, ctx.currentTime + 0.4);
      boomGain.gain.setValueAtTime(0.8, ctx.currentTime);
      boomGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
      boom.start(ctx.currentTime); boom.stop(ctx.currentTime + 0.45);
    }

    function playSound(type) {
      try {
        if      (type === 'pop')     playPop();
        else if (type === 'boing')   playBoing();
        else if (type === 'fart')    playFart();
        else if (type === 'airhorn') playAirhorn();
        else if (type === 'chaos')   playChaos();
      } catch(e) {}
    }

    function burst(x, y, count, dist, size) {
      sparks.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'spark';
        const angle = (i / count) * 360 + Math.random() * 14;
        const d = dist * (0.45 + Math.random() * 0.95);
        const dx = Math.cos(angle * Math.PI / 180) * d + 'px';
        const dy = Math.sin(angle * Math.PI / 180) * d + 'px';
        const sz = size * (0.4 + Math.random() * 1.1);
        const shape = Math.random() > 0.5 ? '50%' : '2px';
        s.style.cssText = `left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;border-radius:${shape};background:${colors[i % colors.length]};--dx:${dx};--dy:${dy};animation-delay:${Math.random() * 0.14}s;animation-duration:${0.65 + Math.random() * 0.6}s`;
        sparks.appendChild(s);
      }
    }

    let step = 0;

    btn.addEventListener('click', function () {
      const idx = Math.min(step, steps.length - 1);
      const s = steps[idx];

      playSound(s.sound);

      const rect = btn.getBoundingClientRect();
      const wrapRect = document.getElementById('wrapper').getBoundingClientRect();
      burst(
        rect.left - wrapRect.left + rect.width  / 2,
        rect.top  - wrapRect.top  + rect.height / 2,
        s.sparks.count, s.sparks.dist, s.sparks.size
      );

      document.body.style.background = s.bg;

      word.classList.remove('show', 'boing', 'shake');
      word.style.fontSize = '0px';
      void word.offsetWidth;

      word.textContent = s.word;
      word.style.backgroundImage = s.gradient;
      word.style.whiteSpace = 'pre-line';
      word.classList.add('show');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        word.style.fontSize = s.size;
        word.classList.add(s.anim);
      }));

      setTimeout(() => { word.classList.remove('boing', 'shake'); }, 700);

      subtitle.textContent   = s.subtitle;
      btn.textContent        = s.btnLabel;
      btn.style.fontSize     = s.btnSize;
      btn.style.padding      = s.btnPad;
      btn.style.borderColor  = s.btnBorder;
      btn.style.color        = s.btnColor;
      btn.style.boxShadow    = `0 4px 0 ${s.btnBorder}`;

      step++;
    });
  </script>
</body>
</html>
